<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 9 Formulário</title>
</head>
<body>
    <div>
       <h1 id="Titulo">Faça seu cadastro</h1>
       <p id="subtitulo">Complete suas informaçôes</p>
    </div>
    
    <form>
        <fieldset class="grupo">
            <div class="campo">
                <label for="nome"><strong>Nome</strong></label>
                <input type="text" name="nome" id="nome" required>
            </div>
                
            <div class="campo">
                <label for="sobrenome">Sobrenome</label>
                <input type="text" nome='Sobrenome' id="sobrenome" required>
            </div>
        </fieldset>

        <div class="campo">
            <label for="emali">Email</label>
            <input type="email" name="email" id="email" required>
        </div>

        <div class="campo">
            <label>Qual é seu o nível de escolaridade</label>
            <label>
                <input type="radio" name="nivel" value="Ensino Fundamental">Ensino Fundamental
            </label>
            <label>
                <input type="radio" name="nivel" value="Ensino Médio">Ensino Médio
            </label>
            <label>
                <input type="radio" name="nivel" value="Ensino Técnico/Profissionalizante">Ensino Técnico/Profissionalizante
            </label>
            <label>
                <input type="radio" name="nivel" value="Ensino Superior">Ensino Fundamental
            </label>
            <label>
                <input type="radio" name="nivel" value="Pós-Graduação">Ensino Fundamental
            </label>
        </div>

        <div class="campo">
            <label>Sua idade</label>
            <select id="idade">
                <option selected disabled value="">Selecione</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10</option>
                <option>11</option>
                <option>12</option>
                <option>13</option>
                <option>14</option>
                <option>15</option>
                <option>16</option>
                <option>17</option>
                <option>18</option>
                <option>19</option>
                <option>20</option>
                <option>21</option>
                <option>22</option>
                <option>23</option>
                <option>24</option>
                <option>25</option>
            </select>
        </div>

       <fieldset class="grupo">
            <div class="campo">
                <label>Selecione quem mora com você</label>
                <input type="checkbox" id="morar" name="morar" value="sozinho">
                <label for="morar1">Sozinho</label>
                <input type="checkbox" id="morar" name="morar" value="mãe">
                <label for="morar2">Mão</label>
                <input type="checkbox" id="morar" name="morar" value="pai">
                <label for="morar3">Pai</label>
                <input type="checkbox" id="morar" name="morar" value="vó">
                <label for="morar4">Vó</label>
                <input type="checkbox" id="morar" name="morar" value="vô">
                <label for="morar5">Vô</label>
                <input type="checkbox" id="morar" name="morar" value="amigo">
                <label for="morar6">Amigo/a</label>
                <input type="checkbox" id="morar" name="morar" value="outro">
                <label for="morar7">Outro</label>
            </div>
       </fieldset>

       <div class="campo">
            <br>
            <label>Conte um pouco sobre você</label>
            <textarea row = "6" style="width: 26em;" id="sobre" nome="sobre"></textarea>
       </div>

       <button type="submit">Concluido</button>
        

    </form>
</body>
</html>
